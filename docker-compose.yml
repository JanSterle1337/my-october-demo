services:
    nginx:
        image: nginx:1.27-alpine
        container_name: october_nginx
        ports:
            - "8000:80"
        volumes:
            - ./:/var/www/html
            - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
        depends_on:
            - app

    app:
        build:
            context: .
            dockerfile: Dockerfile
        container_name: october_app
        user: "${UID:-1000}:${GID:-1000}"
        working_dir: /var/www/html
        volumes:
            - ./:/var/www/html
        environment:
            APP_URL: http://localhost:8000
            DB_CONNECTION: mysql
            DB_HOST: mysql
            DB_PORT: 3306
            DB_DATABASE: october
            DB_USERNAME: october
            DB_PASSWORD: secret
        depends_on:
            mysql:
                condition: service_healthy

    mysql:
        image: mysql:8.4
        container_name: october_mysql
        ports:
            - "3307:3306"
        environment:
            MYSQL_DATABASE: october
            MYSQL_USER: october
            MYSQL_PASSWORD: secret
            MYSQL_ROOT_PASSWORD: root
        healthcheck:
            test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p$$MYSQL_ROOT_PASSWORD --silent"]
            interval: 5s
            timeout: 5s
            retries: 20
        volumes:
            - october_mysql_data:/var/lib/mysql

volumes:
    october_mysql_data:
